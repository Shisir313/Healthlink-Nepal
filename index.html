<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Meta Tags -->
    <title>Healthlink Nepal - Access Healthcare Anytime, Anywhere</title>
    <meta name="description" content="Healthlink Nepal helps you access health guidance, find nearby healthcare facilities, get emergency support, and stay informed with health tips in English and Nepali." />
    <meta name="keywords" content="healthcare, health app, symptom checker, emergency services, Nepal, health awareness, medical help" />
    <meta name="author" content="Healthlink Nepal" />
    
    <!-- Mobile App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Healthlink Nepal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0D9488" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Safe Area for iOS -->
    <style>

        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);

      .pb-safe {
        padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
